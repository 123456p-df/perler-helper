<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拼豆助手 · Perler Helper</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F5F2ED;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E0DBD4;
  --text: #1A1614;
  --text2: #6B6460;
  --text3: #A09A96;
  --accent: #2D4A3E;
  --accent2: #C8A96E;
  --highlight: rgba(45,74,62,0.12);
  --dim: 0.15;
  --radius: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-family: 'Space Mono', monospace;
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: -0.02em;
  flex-shrink: 0;
}
.logo span { color: var(--accent2); }
.header-sep { flex: 1; }
.header-hint {
  font-size: 12px;
  color: var(--text3);
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Layout ── */
.app {
  flex: 1;
  display: grid;
  grid-template-columns: 260px 1fr 220px;
  grid-template-rows: 1fr;
  height: calc(100vh - 56px);
  overflow: hidden;
}

/* ── Left Panel ── */
.left-panel {
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  padding: 14px 16px 10px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
}
.upload-zone {
  margin: 14px;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface2);
}
.upload-zone:hover, .upload-zone.drag { border-color: var(--accent); background: var(--highlight); }
.upload-icon { font-size: 28px; margin-bottom: 8px; }
.upload-text { font-size: 12px; color: var(--text2); line-height: 1.5; }
.upload-text strong { color: var(--text); font-weight: 500; }
#file-input { display: none; }

.color-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 10px;
}
.color-list::-webkit-scrollbar { width: 4px; }
.color-list::-webkit-scrollbar-track { background: transparent; }
.color-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.color-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 8px;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1.5px solid transparent;
  margin-bottom: 3px;
}
.color-item:hover { background: var(--surface2); }
.color-item.active {
  background: var(--highlight);
  border-color: var(--accent);
}
.color-dot {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1px solid rgba(0,0,0,0.1);
  box-shadow: inset 0 1px 2px rgba(255,255,255,0.4);
}
.color-meta { flex: 1; min-width: 0; }
.color-code {
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
}
.color-count {
  font-size: 11px;
  color: var(--text3);
}
.color-hex {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--text3);
}

.empty-state {
  padding: 24px 16px;
  text-align: center;
}
.empty-state p { font-size: 13px; color: var(--text3); line-height: 1.6; }

/* ── Canvas ── */
.canvas-area {
  position: relative;
  overflow: hidden;
  background: var(--surface2);
  display: flex;
  align-items: center;
  justify-content: center;
}
.canvas-bg {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 20px 20px;
  opacity: 0.4;
}
#canvas-wrap {
  position: relative;
  overflow: auto;
  max-width: 100%;
  max-height: 100%;
  cursor: grab;
}
#canvas-wrap:active { cursor: grabbing; }
#main-canvas { display: block; image-rendering: pixelated; }

.zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.zoom-btn {
  width: 32px; height: 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  transition: all 0.15s;
  box-shadow: var(--shadow);
}
.zoom-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.canvas-hint {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}
.canvas-hint-icon { font-size: 48px; opacity: 0.25; margin-bottom: 12px; }
.canvas-hint-text { font-size: 14px; color: var(--text3); line-height: 1.6; }

/* ── Right Panel ── */
.right-panel {
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.selected-preview {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.selected-swatch {
  width: 64px; height: 64px;
  border-radius: 50%;
  margin: 0 auto 10px;
  border: 2px solid rgba(0,0,0,0.1);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
  transition: background 0.3s;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
}
.selected-code {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  color: var(--text);
  min-height: 28px;
}
.selected-name {
  font-size: 12px;
  color: var(--text3);
  margin-top: 2px;
  min-height: 18px;
}
.selected-hex-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 8px;
}
.selected-hex {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  color: var(--text2);
  background: var(--surface2);
  padding: 3px 8px;
  border-radius: 4px;
}
.copy-hex {
  font-size: 11px;
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text2);
  transition: all 0.15s;
}
.copy-hex:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

.stats-section {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
}
.stat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
}
.stat-label { font-size: 12px; color: var(--text3); }
.stat-val { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; color: var(--text); }

.section-title {
  padding: 12px 16px 8px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: var(--text3);
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
}
.all-colors-mini {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
.all-colors-mini::-webkit-scrollbar { width: 3px; }
.all-colors-mini::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.mini-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  padding: 2px 0;
}
.mini-dot {
  width: 20px; height: 20px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.08);
  cursor: pointer;
  transition: transform 0.15s;
  flex-shrink: 0;
  position: relative;
}
.mini-dot:hover { transform: scale(1.3); z-index: 2; }
.mini-dot.active { border: 2px solid var(--accent); transform: scale(1.15); }
.mini-dot[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: 125%;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 10;
}

/* ── Loading overlay ── */
.loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(245,242,237,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 14px;
}
.loading-overlay.show { display: flex; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

/* ── Tooltip ── */
.tooltip {
  position: fixed;
  background: var(--text);
  color: var(--bg);
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding: 4px 8px;
  border-radius: 5px;
  pointer-events: none;
  z-index: 999;
  display: none;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="logo">PERLER<span>·</span>HELPER</div>
  <div class="header-sep"></div>
  <div class="header-hint">
    <span>导入图纸 → 颜色自动分类 → 点击颜色高亮格子</span>
  </div>
</header>

<div class="app">

  <!-- Left: color list -->
  <div class="left-panel">
    <div class="panel-header">颜色清单</div>
    <div class="upload-zone" id="upload-zone">
      <div class="upload-icon">🖼</div>
      <div class="upload-text"><strong>点击上传图纸</strong><br>或拖放图片到这里<br><span style="font-size:10px;color:var(--text3)">PNG / JPG / GIF</span></div>
    </div>
    <input type="file" id="file-input" accept="image/*">
    <div class="color-list" id="color-list">
      <div class="empty-state"><p>导入图纸后<br>颜色清单自动生成</p></div>
    </div>
  </div>

  <!-- Center: canvas -->
  <div class="canvas-area" id="canvas-area">
    <div class="canvas-bg"></div>
    <div id="canvas-hint" class="canvas-hint">
      <div class="canvas-hint-icon">🧩</div>
      <div class="canvas-hint-text">从左侧上传拼豆图纸<br>开始你的创作</div>
    </div>
    <div id="canvas-wrap" style="display:none">
      <canvas id="main-canvas"></canvas>
    </div>
    <div class="zoom-controls" id="zoom-controls" style="display:none">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">−</button>
      <button class="zoom-btn" id="zoom-fit" title="适应窗口">⊡</button>
    </div>
  </div>

  <!-- Right: info panel -->
  <div class="right-panel">
    <div class="selected-preview">
      <div class="selected-swatch" id="sel-swatch">❔</div>
      <div class="selected-code" id="sel-code">—</div>
      <div class="selected-name" id="sel-name">点击左侧颜色高亮</div>
      <div class="selected-hex-row">
        <span class="selected-hex" id="sel-hex">#——</span>
        <button class="copy-hex" id="copy-hex-btn">复制</button>
      </div>
    </div>
    <div class="stats-section" id="stats-section" style="display:none">
      <div class="stat-row">
        <span class="stat-label">图纸颜色数</span>
        <span class="stat-val" id="stat-colors">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">当前高亮颗粒</span>
        <span class="stat-val" id="stat-beads">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">总颗粒数</span>
        <span class="stat-val" id="stat-total">0</span>
      </div>
    </div>
    <div class="section-title">全部颜色速选</div>
    <div class="all-colors-mini" id="mini-dots"></div>
  </div>

</div>

<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">分析颜色中…</div>
</div>

<div class="tooltip" id="tooltip"></div>

  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {code,hex,r,g,b};
});

function hexToRgb(hex) {
  return {
    r: parseInt(hex.slice(1,3),16),
    g: parseInt(hex.slice(3,5),16),
    b: parseInt(hex.slice(5,7),16)
  };
}
function colorDist(r1,g1,b1,r2,g2,b2) {
  return (r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2;
}
function findNearest(r,g,b) {
  let best = MARD_RGB[0], bd = Infinity;
  for (const c of MARD_RGB) {
    const d = colorDist(r,g,b,c.r,c.g,c.b);
    if (d < bd) { bd = d; best = c; }
  }
  return best;
}

// ── State ──
let imageData = null;   // original image data array
let pixelW = 0, pixelH = 0;
let cellMap = [];       // cellMap[y][x] = {code, hex, r,g,b}
let colorGroups = {};   // code -> {hex,r,g,b,count,indices:[{x,y}]}
let activeCode = null;
let zoom = 1;
let CELL = 20;          // cell size in px
const MAX_PIXELS = 120; // max dimension for analysis

const canvas = document.getElementById('main-canvas');
const ctx = canvas.getContext('2d');

// ── Upload ──
const uploadZone = document.getElementById('upload-zone');
const fileInput = document.getElementById('file-input');
uploadZone.addEventListener('click', ()=>fileInput.click());
uploadZone.addEventListener('dragover', e=>{e.preventDefault();uploadZone.classList.add('drag');});
uploadZone.addEventListener('dragleave', ()=>uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e=>{
  e.preventDefault(); uploadZone.classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) loadImage(f);
});
fileInput.addEventListener('change', ()=>{ if(fileInput.files[0]) loadImage(fileInput.files[0]); });

function showLoading(msg='处理中…') {
  document.getElementById('loading').classList.add('show');
  document.getElementById('loading-text').textContent = msg;
}
function hideLoading() { document.getElementById('loading').classList.remove('show'); }

function loadImage(file) {
  showLoading('读取图片…');
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => processImage(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function processImage(img) {
  document.getElementById('loading-text').textContent = '分析颜色中…';
  setTimeout(() => {
    // scale to max dim
    let sw = img.width, sh = img.height;
    if (sw > MAX_PIXELS || sh > MAX_PIXELS) {
      const s = MAX_PIXELS / Math.max(sw, sh);
      sw = Math.round(sw * s);
      sh = Math.round(sh * s);
    }
    pixelW = sw; pixelH = sh;

    // read pixels
    const tmp = document.createElement('canvas');
    tmp.width = sw; tmp.height = sh;
    const tc = tmp.getContext('2d');
    tc.drawImage(img, 0, 0, sw, sh);
    const raw = tc.getImageData(0, 0, sw, sh).data;

    document.getElementById('loading-text').textContent = '匹配 MARD 色号…';
    setTimeout(() => {
      cellMap = [];
      colorGroups = {};
      let total = 0;

      for (let y = 0; y < sh; y++) {
        cellMap[y] = [];
        for (let x = 0; x < sw; x++) {
          const i = (y * sw + x) * 4;
          const a = raw[i+3];
          if (a < 30) {
            cellMap[y][x] = null;
            continue;
          }
          const best = findNearest(raw[i], raw[i+1], raw[i+2]);
          cellMap[y][x] = best;
          if (!colorGroups[best.code]) {
            colorGroups[best.code] = {...best, count:0, indices:[]};
          }
          colorGroups[best.code].count++;
          colorGroups[best.code].indices.push({x,y});
          total++;
        }
      }

      buildUI(total);
      drawCanvas();
      hideLoading();
    }, 30);
  }, 30);
}

function buildUI(total) {
  // sort by count desc
  const sorted = Object.values(colorGroups).sort((a,b)=>b.count-a.count);

  // color list
  const list = document.getElementById('color-list');
  list.innerHTML = '';
  sorted.forEach(c => {
    const item = document.createElement('div');
    item.className = 'color-item';
    item.dataset.code = c.code;
    item.innerHTML = `
      <div class="color-dot" style="background:${c.hex}"></div>
      <div class="color-meta">
        <div class="color-code">${c.code}</div>
        <div class="color-count">${c.count} 颗</div>
      </div>
      <div class="color-hex">${c.hex}</div>`;
    item.addEventListener('click', ()=>selectColor(c.code));
    list.appendChild(item);
  });

  // stats
  document.getElementById('stat-colors').textContent = sorted.length;
  document.getElementById('stat-total').textContent = total.toLocaleString();
  document.getElementById('stat-beads').textContent = '—';
  document.getElementById('stats-section').style.display = '';

  // mini dots
  const mini = document.getElementById('mini-dots');
  mini.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'mini-row';
  sorted.forEach(c => {
    const d = document.createElement('div');
    d.className = 'mini-dot';
    d.style.background = c.hex;
    d.title = `${c.code} · ${c.count}颗`;
    d.dataset.code = c.code;
    d.addEventListener('click', ()=>selectColor(c.code));
    row.appendChild(d);
  });
  mini.appendChild(row);

  // show canvas
  document.getElementById('canvas-hint').style.display = 'none';
  document.getElementById('canvas-wrap').style.display = '';
  document.getElementById('zoom-controls').style.display = '';

  fitZoom();
}

function fitZoom() {
  const area = document.getElementById('canvas-area');
  const aw = area.clientWidth - 32;
  const ah = area.clientHeight - 32;
  const fw = aw / (pixelW * CELL);
  const fh = ah / (pixelH * CELL);
  zoom = Math.min(fw, fh, 2);
  applyZoom();
}

function applyZoom() {
  canvas.style.width = (pixelW * CELL * zoom) + 'px';
  canvas.style.height = (pixelH * CELL * zoom) + 'px';
}

// zoom buttons
document.getElementById('zoom-in').addEventListener('click', ()=>{ zoom = Math.min(zoom*1.3, 8); applyZoom(); });
document.getElementById('zoom-out').addEventListener('click', ()=>{ zoom = Math.max(zoom/1.3, 0.1); applyZoom(); });
document.getElementById('zoom-fit').addEventListener('click', fitZoom);

function drawCanvas() {
  canvas.width = pixelW * CELL;
  canvas.height = pixelH * CELL;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let y = 0; y < pixelH; y++) {
    for (let x = 0; x < pixelW; x++) {
      const c = cellMap[y][x];
      if (!c) continue;

      const px = x * CELL, py = y * CELL;
      const isActive = activeCode && c.code === activeCode;
      const hasActive = activeCode !== null;

      // bead circle
      ctx.beginPath();
      ctx.arc(px + CELL/2, py + CELL/2, CELL/2 - 1, 0, Math.PI*2);

      if (!hasActive || isActive) {
        // full color
        ctx.fillStyle = c.hex;
        ctx.fill();
        // inner shine
        const grad = ctx.createRadialGradient(
          px + CELL*0.38, py + CELL*0.32, 0,
          px + CELL/2, py + CELL/2, CELL/2
        );
        grad.addColorStop(0, 'rgba(255,255,255,0.35)');
        grad.addColorStop(1, 'rgba(0,0,0,0.12)');
        ctx.fillStyle = grad;
        ctx.fill();
      } else {
        // dimmed
        ctx.fillStyle = c.hex;
        ctx.globalAlpha = 0.1;
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // border
      ctx.strokeStyle = isActive ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.08)';
      ctx.lineWidth = isActive ? 1.5 : 0.5;
      ctx.stroke();

      // active highlight ring
      if (isActive) {
        ctx.beginPath();
        ctx.arc(px + CELL/2, py + CELL/2, CELL/2 + 1, 0, Math.PI*2);
        ctx.strokeStyle = 'rgba(45,74,62,0.6)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }
    }
  }
}

// canvas hover tooltip
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', e => {
  if (!activeCode && Object.keys(colorGroups).length === 0) return;
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / (rect.width / canvas.width);
  const sy = (e.clientY - rect.top) / (rect.height / canvas.height);
  const gx = Math.floor(sx / CELL);
  const gy = Math.floor(sy / CELL);
  if (gx >= 0 && gx < pixelW && gy >= 0 && gy < pixelH) {
    const c = cellMap[gy][gx];
    if (c) {
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 28) + 'px';
      tooltip.textContent = `${c.code}  ${c.hex}`;
    } else {
      tooltip.style.display = 'none';
    }
  }
});
canvas.addEventListener('mouseleave', ()=>{ tooltip.style.display='none'; });

// canvas click: select color
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) / (rect.width / canvas.width);
  const sy = (e.clientY - rect.top) / (rect.height / canvas.height);
  const gx = Math.floor(sx / CELL);
  const gy = Math.floor(sy / CELL);
  if (gx >= 0 && gx < pixelW && gy >= 0 && gy < pixelH) {
    const c = cellMap[gy][gx];
    if (c) selectColor(c.code);
  }
});

function selectColor(code) {
  if (activeCode === code) {
    // deselect
    activeCode = null;
    document.querySelectorAll('.color-item').forEach(el=>el.classList.remove('active'));
    document.querySelectorAll('.mini-dot').forEach(el=>el.classList.remove('active'));
    document.getElementById('sel-swatch').textContent = '❔';
    document.getElementById('sel-swatch').style.background = '';
    document.getElementById('sel-code').textContent = '—';
    document.getElementById('sel-name').textContent = '点击左侧颜色高亮';
    document.getElementById('sel-hex').textContent = '#——';
    document.getElementById('stat-beads').textContent = '—';
    drawCanvas();
    return;
  }

  activeCode = code;
  const c = colorGroups[code];

  // update right panel
  document.getElementById('sel-swatch').textContent = '';
  document.getElementById('sel-swatch').style.background = c.hex;
  document.getElementById('sel-code').textContent = code;
  document.getElementById('sel-name').textContent = `共 ${c.count.toLocaleString()} 颗`;
  document.getElementById('sel-hex').textContent = c.hex;
  document.getElementById('stat-beads').textContent = c.count.toLocaleString();

  // update list
  document.querySelectorAll('.color-item').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });
  // scroll active into view
  const activeItem = document.querySelector(`.color-item[data-code="${code}"]`);
  if (activeItem) activeItem.scrollIntoView({block:'nearest'});

  // update mini dots
  document.querySelectorAll('.mini-dot').forEach(el => {
    el.classList.toggle('active', el.dataset.code === code);
  });

  drawCanvas();
}

// copy hex
document.getElementById('copy-hex-btn').addEventListener('click', () => {
  const hex = document.getElementById('sel-hex').textContent;
  if (hex && hex !== '#——') {
    navigator.clipboard.writeText(hex).catch(()=>{});
    const btn = document.getElementById('copy-hex-btn');
    btn.textContent = '已复制!';
    setTimeout(()=>btn.textContent='复制', 1500);
  }
});
</script>
